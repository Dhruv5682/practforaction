<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure DevOps CI/CD App</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="glass-container">
        <div class="content">
            <div class="icon-wrapper">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="azure-icon"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"></path><polyline points="12 22 12 12"></polyline><polyline points="21 8 12 12 3 8"></polyline><polyline points="12 12 21 16"></polyline></svg>
            </div>
            <h1>Welcome to Your Azure App</h1>
            <p class="subtitle">Deployed seamlessly via Azure DevOps CI/CD</p>
            
            <div class="info-card">
                <div class="status-indicator">
                    <span class="dot pulse"></span>
                    <span>System Online</span>
                </div>
                <p class="author">Made with ❤️ by <strong>Dhruv</strong></p>
            </div>

            <button class="action-btn">Explore Documentation</button>
        </div>
    </main>
</body>
</html>
